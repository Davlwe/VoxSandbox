name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten + Build
        run: |
          # Install emsdk
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          cd ..

          # Configure and build
          emcmake cmake -B build-web \
            -DWEB_BUILD=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-web --parallel

          # Prepare deploy folder
          mkdir -p deploy
          cp build-web/VoxSandbox.html deploy/index.html
          cp build-web/VoxSandbox.js   deploy/
          cp build-web/VoxSandbox.wasm deploy/
          cp build-web/VoxSandbox.data deploy/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: gh-pages
