name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure (CMake + FetchContent raylib)
        run: |
          emcmake cmake -B build-web \
            -DWEB_BUILD=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-web --parallel

      - name: Rename to index.html
        run: |
          mv build-web/VoxSandbox.html build-web/index.html 2>/dev/null || true
          ls -la build-web/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
