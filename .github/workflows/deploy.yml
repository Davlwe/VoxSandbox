name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure (CMake + FetchContent raylib)
        run: |
          emcmake cmake -B build-web \
            -DWEB_BUILD=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-web --parallel

      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp build-web/VoxSandbox.html deploy/index.html
          cp build-web/VoxSandbox.js   deploy/
          cp build-web/VoxSandbox.wasm deploy/
          cp build-web/VoxSandbox.data deploy/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: gh-pages
