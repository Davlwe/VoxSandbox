name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install 3.1.61
          ./emsdk activate 3.1.61
          echo "$GITHUB_WORKSPACE/emsdk" >> $GITHUB_PATH
          echo "EMSDK_ROOT=$GITHUB_WORKSPACE/emsdk" >> $GITHUB_ENV

      - name: Activate Emscripten env
        run: |
          source $EMSDK_ROOT/emsdk_env.sh
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "EMSDK=$EMSDK_ROOT" >> $GITHUB_ENV
          echo "EM_CONFIG=$EMSDK_ROOT/.emscripten" >> $GITHUB_ENV

      - name: Clone raylib
        run: |
          git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git

      - name: Build
        run: |
          source $EMSDK_ROOT/emsdk_env.sh
          mkdir -p web
          emcc -o web/index.html src/*.cpp \
            raylib/src/rcore.c \
            raylib/src/rshapes.c \
            raylib/src/rtextures.c \
            raylib/src/rtext.c \
            raylib/src/rmodels.c \
            raylib/src/utils.c \
            -Iraylib/src \
            -Iraylib/src/external/glfw/include \
            -DPLATFORM_WEB \
            -s USE_GLFW=3 \
            -s ASYNCIFY \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s TOTAL_STACK=64MB \
            --shell-file index.html \
            -O2

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web
          publish_branch: gh-pages
