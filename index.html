<!doctypehtml><html lang=en><head><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>VoxSandbox</title><style>*{margin:0;padding:0;box-sizing:border-box}body,html{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:-apple-system,'Segoe UI',sans-serif}#container{display:flex;align-items:center;justify-content:center;width:100%;height:100%}canvas{display:block;image-rendering:pixelated}#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ccc;font-size:24px;text-align:center;pointer-events:none}#loading .spinner{width:40px;height:40px;margin:0 auto 16px;border:3px solid #444;border-top:3px solid #ccc;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div id=container><canvas id=canvas oncontextmenu=event.preventDefault()></canvas><div id=loading><div class=spinner></div><div>Loading VoxSandbox…</div></div></div><script>var canvas=document.getElementById("canvas"),loading=document.getElementById("loading"),observer=new MutationObserver((function(){canvas.width>0&&canvas.height>0&&(loading.style.display="none",observer.disconnect())}));observer.observe(canvas,{attributes:!0,attributeFilter:["width","height"]})</script><script async src=index.js></script></body></html>
